baseURL: 'https://kumakki.com/'
locale: 'ja'
title: "kumakki's world"
theme: "PaperMod"

params:
  mainSections: ["aboutme"]
  disableHomePageList: false
  disableSpecial1stPost: false
  midiplayer: "https://files.kumakki.com/software/kumakki-midi-player.zip"

menu:
  main:
    - name: "プロフィール"
      url: "/aboutme/"
      weight: 1
      identifier: "aboutme"
    - name: "創作活動"
      url: "/creations/"
      weight: 2
      identifier: "creations"
    - name: "ゲーム"
      url: "/games/"
      weight: 3
      identifier: "games"
    - name: "知識庫"
      url: "/knowledge/"
      weight: 4
      identifier: "knowledge"

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      hardWraps: true

frontmatter:
  lastmod:
    - :fileModTime
